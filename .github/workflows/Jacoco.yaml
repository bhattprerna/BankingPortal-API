name: Java JaCoCo Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven Tests
        run: mvn clean test -Dpmd.skip=true -Dmaven.test.failure.ignore=true

      - name: Check JaCoCo Report
        run: |
            ls -la target/site/jacoco/
            grep -o 'counter type="LINE"[^>]*' target/site/jacoco/jacoco.xml | head
 

      - name: Publish JaCoCo Report
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: JaCoCo Code Coverage Report

      - name: Generate JaCoCo Coverage Table
        run: |
                    echo "## JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "| Package/Class | Missed Lines | Covered Lines | Coverage |" >> $GITHUB_STEP_SUMMARY
                    echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY

                    python3 <<'EOF'
                    import xml.etree.ElementTree as ET

                    xml_file = "target/site/jacoco/jacoco.xml"

                    tree = ET.parse(xml_file)
                    root = tree.getroot()

                    with open("/tmp/jacoco_table.txt", "w") as f:
                        for package in root.findall(".//package"):
                            name = package.attrib.get("name").replace("/", ".")

                            for counter in package.findall("counter"):
                                if counter.attrib["type"] == "LINE":
                                    missed = int(counter.attrib["missed"])
                                    covered = int(counter.attrib["covered"])
                                    total = missed + covered

                                    if total > 0:
                                        percentage = round((covered / total) * 100, 2)

                                        f.write(
                                            f"| {name} | {missed} | {covered} | {percentage}% |\n"
                                        )

                    EOF

                    cat /tmp/jacoco_table.txt >> $GITHUB_STEP_SUMMARY

      - name: Coverage Summary
        run: |
          echo "## JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "- Overall Coverage: ${{ steps.jacoco.outputs.coverage-overall }}%" >> $GITHUB_STEP_SUMMARY
          echo "- Changed Files Coverage: ${{ steps.jacoco.outputs.coverage-changed-files }}%" >> $GITHUB_STEP_SUMMARY